<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>Smart Finance Dashboard</title>

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <!-- Custom Design Styles -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="dashboard-container">
      <!-- 1. TOP HEADER & THEME TOGGLE -->
      <header class="d-flex justify-content-between align-items-center mb-3">
        <div>
          <h1 class="h4 m-0">Smart Budget</h1>
          <p class="subtitle m-0">Track, analyze, & optimize cash flow</p>
        </div>

        <div class="theme-switch-wrapper">
         
          <label class="theme-switch">
            <input type="checkbox" id="theme-toggle" onchange="toggleTheme()" />
            <span class="slider round"></span>
         
        </div>
      </header>

            <!-- Inside index.html near your balance section -->
<div class="currency-selector-box">
  <label for="currency-select" class="form-label">Currency</label>
  <select id="currency-select" class="form-select">
    <option value="USD">USD ($)</option>
    <option value="EUR">EUR (€)</option>
    <option value="GBP">GBP (£)</option>
    <option value="NGN">NGN (₦)</option>
    <option value="XAF">XAF (CFA Franc)</option>
  </select>
</div>
      <!-- 2. BALANCE DISPLAY -->
      <section class="card-box balance-card">
        <h2>Total Balance</h2>
        <h1 id="balance">$0.00</h1>
      </section>


      <!-- 3. INCOME & EXPENSES SUMMARY -->
      <section class="card-box">
        <div class="stats-grid">
          <div class="stat-box">
            <h3>Total Income</h3>
            <p id="money-plus" class="money plus">+$0.00</p>
          </div>
          <div
            class="stat-box"
            style="border-left: 1px solid var(--border-color)"
          >
            <h3>Total Expenses</h3>
            <p id="money-minus" class="money minus">-$0.00</p>
          </div>
        </div>
      </section>

      <!-- 4. EXPENSE CHART SECTION -->
      <section class="card-box text-center">
        <h3 class="h6 mb-3">Expense Breakdown</h3>
        <div class="chart-container" style="max-width: 220px; margin: 0 auto">
          <canvas id="categoryChart"></canvas>
        </div>
      </section>

      <!-- 5. ADD NEW TRANSACTION FORM -->
      <section class="card-box">
        <h3 class="h6 mb-3">Add New Transaction</h3>

        <form id="form">
          <!-- Step A: Income vs Expense Selector -->
          <div class="mb-3">
            <label class="form-label">Transaction Type</label>
            <div class="type-toggle-group">
              <button
                type="button"
                id="type-expense-btn"
                class="type-toggle-btn active-expense"
                onclick="setTransactionType('expense')"
              >
                💸 Expense
              </button>
              <button
                type="button"
                id="type-income-btn"
                class="type-toggle-btn"
                onclick="setTransactionType('income')"
              >
                💰 Income
              </button>
            </div>
          </div>

          <!-- Step B: Description Input -->
          <div class="mb-3">
            <label for="text" class="form-label">Description</label>
            <input
              type="text"
              id="text"
              class="form-control"
              placeholder="e.g. Netflix, Groceries..."
              required
            />
          </div>

          <!-- Step C: Amount & Category (Stack on mobile using col-12 col-sm-6) -->
          <div class="row g-2 mb-3">
            <div class="col-12 col-sm-6">
              <label for="amount" class="form-label">Amount </label>
              <input
                type="number"
                step="0.01"
                id="amount"
                class="form-control"
                placeholder="0.00"
                required
              />
            </div>

            <div class="col-12 col-sm-6">
              <label for="category" class="form-label">Category</label>
              <select id="category" class="form-select">
                <option value="General">General</option>
                <option value="Food">Food</option>
                <option value="Rent & Housing">Rent & Housing</option>
                <option value="Utilities">Utilities</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Salary">Salary</option>
              </select>
            </div>
          </div>

          <button id="submit-btn" class="btn-submit">Add Transaction</button>
        </form>
      </section>

      <!-- 6. TRANSACTION HISTORY -->
      <section class="card-box">
        <h3 class="h6 mb-3">Transaction History</h3>

        <!-- Search & Filters (Responsive Stacking for Mobile) -->
        <div class="row g-2 mb-3">
          <div class="col-12">
            <input
              type="text"
              id="search-input"
              class="form-control"
              placeholder="🔎 Search transactions..."
              oninput="filterTransactions()"
            />
          </div>
          <div class="col-6">
            <select
              id="filter-category"
              class="form-select"
              onchange="filterTransactions()"
            >
              <option value="All">All Categories</option>
              <option value="Rent & Housing">Rent & Housing</option>
              <option value="Food">Food</option>
              <option value="Utilities">Utilities</option>
              <option value="Salary">Salary</option>
              <option value="General">General</option>
              <option value="Entertainment">Entertainment</option>
            </select>
          </div>
          <div class="col-6">
            <select
              id="sort-order"
              class="form-select"
              onchange="filterTransactions()"
            >
              <option value="newest">Newest First</option>
              <option value="oldest">Oldest First</option>
              <option value="highest">Highest Amount</option>
              <option value="lowest">Lowest Amount</option>
            </select>
          </div>
        </div>

        <ul id="list" class="list"></ul>

        <!-- Export & Clear Buttons -->
        <div class="d-flex gap-2 mt-3">
          <button
            type="button"
            class="btn btn-sm btn-outline-primary flex-grow-1 fw-bold"
            onclick="exportToCSV()"
          >
            <i class="bi bi-download me-1"></i> Export CSV
          </button>

          <button
            type="button"
            class="btn btn-sm btn-outline-danger flex-grow-1 fw-bold"
            onclick="clearAllData()"
          >
            <i class="bi bi-trash3 me-1"></i> Clear All
          </button>
        </div>
      </section>

      <!-- 7. CATEGORY BUDGETS -->
      <section class="card-box">
        <h3 class="h6 mb-3">Category Budgets</h3>
        <div id="budgets-container"></div>
      </section>
    </div>

    <!-- JavaScript Bundles -->
    <script type="module" src="./js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </body>
</html>
